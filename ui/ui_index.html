<!-- Initialize with server data -->
<script>
  (function() {
    var userData = null, configData = null;
    try {
      userData = <?!= user ?>;
      configData = <?!= config ?>;
    } catch (e) {
      // Template injection failed to parse — fall back to server fetch
      userData = null; configData = null;
    }
    function start() {
      if (typeof App === 'undefined' || !App.init) {
        // App script not ready yet — retry shortly
        return setTimeout(start, 50);
      }
      App.init(userData, configData);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', start);
    } else {
      start();
    }
  })();
</script>
