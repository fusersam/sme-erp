<script>
/**
 * SME Business Manager - Client Application
 * ============================================
 * Single-page application controller.
 * Phase 2: Full sales module (Customers, Quotations, Invoices, Receipts, Accounting).
 */

var App = (function() {

  // Client build tag — baked into THIS app.html bundle. Compared against the
  // server's reported version in Database Info. If they differ, the browser is
  // running a stale cached/old-deployment copy of this file even though the
  // server code is newer (the classic "edited the file but the live URL serves
  // an old deployment version" trap). Bump this whenever app.html changes and
  // it becomes a reliable deployment tracer.
  var BUILD_TAG = '1.5.3-deploycheck';

  // ── State ──
  var _user = null;
  var _config = {};
  var _currentModule = 'dashboard';
  var _dashboardData = null;
  var _charts = {};
  var _journalAccounts = [];
  var _payrollStructures = [];

  var MODULE_TITLES = {
    dashboard: 'Dashboard', accounting: 'Accounting', customers: 'Customers',
    quotations: 'Quotations', invoices: 'Invoices', receipts: 'Receipts',
    sales: 'Sales & Invoices', purchasing: 'Purchasing', expenses: 'Expenses',
    cashbank: 'Cash & Bank', payroll: 'Payroll', assets: 'Fixed Assets',
    inventory: 'Inventory', products: 'Products', categories: 'Categories',
    'inv-txns': 'Stock Transactions', 'inv-lowstock': 'Low Stock Report',
    'inv-valuation': 'Inventory Valuation', suppliers: 'Suppliers',
    employees: 'Employees', 'salary-structures': 'Salary Structures',
    'payroll-runs': 'Payroll Runs',
    reports: 'Reports', analytics: 'Analytics & Ratios',
    settings: 'Settings', users: 'User Management'
  };

  // ============================================================
  // INIT
  // ============================================================
  /**
   * Initialize the app.
   *
   * Can be called two ways:
   *  1. init(userData, configData) — server-injected objects (preferred, fast)
   *  2. init()                     — no args; fetches user+config via
   *                                  google.script.run (resilient fallback used
   *                                  when template injection is unavailable or
   *                                  failed to parse)
   */
  function init(userData, configData) {
    try {
      if (userData) {
        _applyUser(userData);
        _config = configData || {};
        navigate('dashboard');
      } else {
        // Fallback: fetch from server
        _bootstrapFromServer();
      }
    } catch (e) {
      // Last-resort fallback if anything above throws
      _bootstrapFromServer();
    }
  }

  /**
   * Fetch user and config from the server, then render.
   * Used when init() is called without injected data.
   */
  function _bootstrapFromServer() {
    google.script.run
      .withSuccessHandler(function(user) {
        if (!user) {
          // Not logged in — send back to login
          window.top.location.reload();
          return;
        }
        _applyUser(user);
        google.script.run
          .withSuccessHandler(function(cfg) {
            _config = cfg || {};
            navigate('dashboard');
          })
          .withFailureHandler(function() {
            _config = {};
            navigate('dashboard');
          })
          .getClientConfigData();
      })
      .withFailureHandler(function(e) {
        var c = document.getElementById('pageContent');
        if (c) c.innerHTML = '<div class="alert alert-danger m-3">Failed to load user session: ' +
          (e && e.message ? e.message : 'unknown error') + '<br><button class="btn btn-sm btn-primary mt-2" onclick="window.top.location.reload()">Retry</button></div>';
      })
      .getUserInfo();
  }

  /**
   * Apply the user object to state and the header UI.
   */
  function _applyUser(user) {
    _user = user;
    var avatarEl = document.getElementById('userAvatar');
    var nameEl   = document.getElementById('userName');
    var roleEl   = document.getElementById('userRole');
    if (_user) {
      var initials = _user.name
        ? _user.name.split(' ').map(function(n){ return n[0]; }).join('').toUpperCase().substring(0,2)
        : (_user.email ? _user.email[0].toUpperCase() : 'U');
      if (avatarEl) avatarEl.textContent = initials;
      if (nameEl)   nameEl.textContent   = _user.name || _user.email || 'User';
      if (roleEl)   roleEl.textContent   = _user.role || '';
    }
  }

  // ============================================================
  // NAVIGATION
  // ============================================================
  function navigate(module, params) {
    _currentModule = module;
    document.querySelectorAll('.nav-item').forEach(function(el) {
      el.classList.remove('active');
      var dm = el.getAttribute('data-module');
      var invPages = ['products','categories','inv-txns','inv-lowstock','inv-valuation','suppliers'];
      var payrollPages = ['employees','salary-structures','payroll-runs'];
      if (dm === module || (dm === 'sales' && ['customers','quotations','invoices','receipts'].indexOf(module) !== -1) || (dm === 'inventory' && invPages.indexOf(module) !== -1) || (dm === 'payroll' && payrollPages.indexOf(module) !== -1)) {
        el.classList.add('active');
      }
    });
    document.getElementById('pageTitle').textContent = MODULE_TITLES[module] || module;
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');

    var c = document.getElementById('pageContent');
    switch (module) {
      case 'dashboard':   _renderDashboard(c); break;
      case 'customers':   _renderCustomers(c, params); break;
      case 'quotations':  _renderQuotations(c, params); break;
      case 'invoices':    _renderInvoices(c, params); break;
      case 'receipts':    _renderReceipts(c, params); break;
      case 'accounting':    _renderAccounting(c); break;
      case 'sales':         _renderSalesHub(c); break;
      case 'inventory':     _renderInventoryHub(c); break;
      case 'products':      _renderProducts(c, params); break;
      case 'categories':    _renderCategories(c); break;
      case 'inv-txns':      _renderInventoryTxns(c, params); break;
      case 'inv-lowstock':  _renderLowStock(c); break;
      case 'inv-valuation': _renderValuation(c); break;
      case 'suppliers':     _renderSuppliers(c, params); break;
      case 'payroll':       _renderPayrollHub(c); break;
      case 'employees':     _renderEmployees(c, params); break;
      case 'salary-structures': _renderSalaryStructures(c); break;
      case 'payroll-runs':  _renderPayrollRuns(c, params); break;
      case 'reports':       _renderReports(c, params); break;
      case 'analytics':     _renderAnalytics(c); break;
      case 'settings':      _renderSettings(c); break;
      case 'users':         _renderUsers(c); break;
      default:              _renderPlaceholder(c, module); break;
    }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('active');
  }

  // ============================================================
  // HELPERS
  // ============================================================
  function _fmtMoney(a, s) { s=s||_config.currencySymbol||'GH₵'; var n=parseFloat(a)||0; return s+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
  function _fmtDate(d) { if(!d)return'-'; var dt=new Date(d); if(isNaN(dt))return'-'; return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
  function _esc(s) { if(!s)return''; var d=document.createElement('div'); d.appendChild(document.createTextNode(s)); return d.innerHTML; }

  /**
   * Safely unwrap the .data array from a google.script.run result.
   * google.script.run delivers `null` to the success handler if the called
   * Apps Script function ever returns undefined (or the call otherwise fails
   * to deliver a payload) — reading .data off that null was a real crash
   * ("Cannot read properties of null (reading 'data')") that froze whatever
   * list was being rendered. Use this anywhere a list result is unwrapped.
   * @param {*} result
   * @returns {Array}
   */
  function _data(result) { return (result && result.data) || []; }
  function _escAttr(s) { return _esc(s).replace(/"/g,'&quot;'); }
  function _loading(c) { c.innerHTML='<div class="module-loading"><div class="spinner-border text-primary"></div></div>'; }
  function _badge(s) { return '<span class="badge-status '+(s||'').toLowerCase()+'">'+_esc(s)+'</span>'; }

  function showLoading(s) { document.getElementById('loadingOverlay').style.display=s?'flex':'none'; }

  function showToast(message, type) {
    type=type||'info'; var icons={success:'check-circle',danger:'x-circle',warning:'exclamation-circle',info:'info-circle'};
    var id='t_'+Date.now();
    document.getElementById('toastContainer').insertAdjacentHTML('beforeend',
      '<div id="'+id+'" class="toast align-items-center text-bg-'+type+' border-0" role="alert"><div class="d-flex">' +
      '<div class="toast-body"><i class="bi bi-'+(icons[type]||'info-circle')+' me-2"></i>'+_esc(message)+'</div>' +
      '<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>');
    var el=document.getElementById(id); var t=new bootstrap.Toast(el,{autohide:true,delay:5000}); t.show();
    el.addEventListener('hidden.bs.toast',function(){el.remove();});
  }

  function _callModule(mod, action, data, cb, errCb) {
    google.script.run
      .withSuccessHandler(function(result) {
        console.groupCollapsed('moduleAction success: ' + mod + '/' + action);
        console.log('request payload:', data || {});
        console.log('response result:', result);
        console.groupEnd();
        cb(result);
      })
      .withFailureHandler(function(e) { if(errCb) errCb(e); else showToast(e.message,'danger'); })
      .moduleAction(mod, action, data||{});
  }

  // ============================================================
  // SALES HUB (sub-nav)
  // ============================================================
  function _renderSalesHub(c) {
    c.innerHTML =
      '<div class="row g-3">' +
      [
        {m:'customers',i:'people',t:'Customers',d:'Manage customer records and statements'},
        {m:'quotations',i:'file-earmark-text',t:'Quotations',d:'Create and manage sales quotes'},
        {m:'invoices',i:'receipt-cutoff',t:'Invoices',d:'Generate and track invoices'},
        {m:'receipts',i:'cash-coin',t:'Receipts',d:'Record customer payments'}
      ].map(function(x){
        return '<div class="col-sm-6 col-lg-3"><div class="card" style="cursor:pointer;" onclick="App.navigate(\''+x.m+'\')">' +
          '<div class="card-body text-center py-4"><i class="bi bi-'+x.i+'" style="font-size:2.5rem;color:var(--brand-primary);"></i>' +
          '<h5 class="mt-3">'+x.t+'</h5><p class="text-muted small mb-0">'+x.d+'</p></div></div></div>';
      }).join('') + '</div>';
  }

  // ============================================================
  // CUSTOMERS
  // ============================================================
  function _renderCustomers(c, params) {
    if (params && params.view) { _renderCustomerDetail(c, params.view); return; }
    _loading(c);
    _callModule('customers','list',{sort:'name',order:'asc'},function(result) {
      var rows = _data(result);
      var html = '<div class="module-toolbar">' +
        '<div class="search-box"><i class="bi bi-search"></i><input class="form-control" placeholder="Search customers..." oninput="App._filterTable(this)"></div>' +
        '<button class="btn btn-primary" onclick="App.showCustomerModal()"><i class="bi bi-plus-lg me-1"></i>New Customer</button>' +
        '</div><div class="card"><div class="table-container"><table class="table table-hover" id="dataTable"><thead><tr>' +
        '<th>Name</th><th>Email</th><th>Phone</th><th>Balance</th><th>Status</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        if (r.status==='Deleted') return;
        html+='<tr onclick="App.navigate(\'customers\',{view:\''+r.customer_id+'\'})"><td>'+_esc(r.name)+'</td><td>'+_esc(r.email)+'</td><td>'+_esc(r.phone)+'</td>' +
          '<td>'+_fmtMoney(r.balance)+'</td><td>'+_badge(r.status)+'</td></tr>';
      });
      html+='</tbody></table></div></div>';
      c.innerHTML=html;
    });
  }

  function _renderCustomerDetail(c, id) {
    _loading(c);
    _callModule('customers','get',{id:id},function(cust) {
      var html = '<a href="javascript:void(0)" class="text-decoration-none mb-3 d-inline-block" onclick="App.navigate(\'customers\')"><i class="bi bi-arrow-left me-1"></i>Back to Customers</a>' +
        '<div class="detail-header"><div><h4>'+_esc(cust.name)+'</h4><p class="text-muted mb-0">'+_esc(cust.email||'')+' &middot; '+_esc(cust.phone||'')+'</p></div>' +
        '<div class="detail-meta"><div class="meta-item"><div class="meta-label">Balance</div><div class="meta-value">'+_fmtMoney(cust.balance)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Credit Limit</div><div class="meta-value">'+_fmtMoney(cust.credit_limit)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Terms</div><div class="meta-value">'+(cust.payment_terms||30)+' days</div></div></div></div>' +
        '<div class="card"><div class="card-header"><span>Recent Invoices</span>' +
        '<button class="btn btn-sm btn-primary" onclick="App.showInvoiceModal(\''+cust.customer_id+'\',\''+_escAttr(cust.name)+'\')"><i class="bi bi-plus-lg me-1"></i>New Invoice</button></div>' +
        '<div class="table-container"><table class="table table-hover"><thead><tr><th>Number</th><th>Date</th><th>Total</th><th>Balance</th><th>Status</th></tr></thead><tbody>';
      (cust.recentInvoices||[]).forEach(function(inv) {
        html+='<tr onclick="App.navigate(\'invoices\',{view:\''+inv.invoice_id+'\'})"><td>'+_esc(inv.invoice_number)+'</td><td>'+_fmtDate(inv.date)+'</td>' +
          '<td>'+_fmtMoney(inv.total)+'</td><td>'+_fmtMoney(inv.balance_due)+'</td><td>'+_badge(inv.status)+'</td></tr>';
      });
      if (!(cust.recentInvoices||[]).length) html+='<tr><td colspan="5" class="text-center text-muted py-3">No invoices yet</td></tr>';
      html+='</tbody></table></div></div>';
      c.innerHTML=html;
    });
  }

  function showCustomerModal(existing) {
    var d = existing||{};
    var title = d.customer_id ? 'Edit Customer' : 'New Customer';
    var html = '<div class="modal fade" id="crudModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">' +
      '<div class="modal-header"><h5 class="modal-title">'+title+'</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>' +
      '<div class="modal-body"><div class="row g-3">' +
      '<div class="col-12"><label class="form-label">Name *</label><input class="form-control" id="f_name" value="'+_escAttr(d.name)+'"></div>' +
      '<div class="col-md-6"><label class="form-label">Email</label><input class="form-control" id="f_email" value="'+_escAttr(d.email)+'"></div>' +
      '<div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" id="f_phone" value="'+_escAttr(d.phone)+'"></div>' +
      '<div class="col-12"><label class="form-label">Address</label><input class="form-control" id="f_address" value="'+_escAttr(d.address)+'"></div>' +
      '<div class="col-md-6"><label class="form-label">City</label><input class="form-control" id="f_city" value="'+_escAttr(d.city)+'"></div>' +
      '<div class="col-md-6"><label class="form-label">Payment Terms (days)</label><input type="number" class="form-control" id="f_terms" value="'+(d.payment_terms||30)+'"></div>' +
      '<div class="col-md-6"><label class="form-label">Credit Limit</label><input type="number" class="form-control" id="f_credit" value="'+(d.credit_limit||0)+'"></div>' +
      '<div class="col-12"><label class="form-label">Notes</label><textarea class="form-control" id="f_notes" rows="2">'+_esc(d.notes||'')+'</textarea></div>' +
      '</div></div><div class="modal-footer">' +
      '<button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>' +
      '<button class="btn btn-primary" onclick="App.saveCustomer(\''+_escAttr(d.customer_id||'')+'\')"><i class="bi bi-check-lg me-1"></i>Save</button>' +
      '</div></div></div></div>';
    _showModal(html);
  }

  function saveCustomer(existingId) {
    var data = {
      name: document.getElementById('f_name').value,
      email: document.getElementById('f_email').value,
      phone: document.getElementById('f_phone').value,
      address: document.getElementById('f_address').value,
      city: document.getElementById('f_city').value,
      payment_terms: parseInt(document.getElementById('f_terms').value) || 30,
      credit_limit: parseFloat(document.getElementById('f_credit').value) || 0,
      notes: document.getElementById('f_notes').value
    };
    var action = existingId ? 'update' : 'create';
    if (existingId) data.customer_id = existingId;
    showLoading(true);
    _callModule('customers', action, data, function(r) {
      showLoading(false); _hideModal();
      showToast('Customer '+(existingId?'updated':'created'), 'success');
      navigate('customers');
    }, function(e) { showLoading(false); showToast(e.message,'danger'); });
  }

  // ============================================================
  // INVOICES
  // ============================================================
  function _renderInvoices(c, params) {
    if (params && params.view) { _renderInvoiceDetail(c, params.view); return; }
    _loading(c);
    _callModule('invoices','list',{sort:'date',order:'desc'},function(result) {
      var rows = _data(result);
      var html = '<div class="module-toolbar">' +
        '<div class="search-box"><i class="bi bi-search"></i><input class="form-control" placeholder="Search invoices..." oninput="App._filterTable(this)"></div>' +
        '<button class="btn btn-primary" onclick="App.showInvoiceModal()"><i class="bi bi-plus-lg me-1"></i>New Invoice</button></div>' +
        '<div class="card"><div class="table-container"><table class="table table-hover" id="dataTable"><thead><tr>' +
        '<th>Number</th><th>Date</th><th>Customer</th><th>Total</th><th>Paid</th><th>Balance</th><th>Status</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        if (r.status==='Cancelled') return;
        html+='<tr onclick="App.navigate(\'invoices\',{view:\''+r.invoice_id+'\'})"><td>'+_esc(r.invoice_number)+'</td><td>'+_fmtDate(r.date)+'</td>' +
          '<td>'+_esc(r.customer_name)+'</td><td>'+_fmtMoney(r.total)+'</td><td>'+_fmtMoney(r.amount_paid)+'</td>' +
          '<td>'+_fmtMoney(r.balance_due)+'</td><td>'+_badge(r.status)+'</td></tr>';
      });
      if(!rows.length) html+='<tr><td colspan="7" class="empty-state"><i class="bi bi-receipt-cutoff"></i>No invoices yet</td></tr>';
      html+='</tbody></table></div></div>';
      c.innerHTML=html;
    });
  }

  function _renderInvoiceDetail(c, id) {
    _loading(c);
    _callModule('invoices','get',{id:id},function(inv) {
      var html = '<a href="javascript:void(0)" class="text-decoration-none mb-3 d-inline-block" onclick="App.navigate(\'invoices\')"><i class="bi bi-arrow-left me-1"></i>Back</a>' +
        '<div class="detail-header"><div><h4>'+_esc(inv.invoice_number)+'</h4><p class="text-muted mb-0">'+_esc(inv.customer_name)+' &middot; '+_fmtDate(inv.date)+'</p></div>' +
        '<div class="action-btn-group">';
      if (inv.status==='Draft') {
        html+='<button class="btn btn-success" onclick="App.sendInvoice(\''+id+'\')"><i class="bi bi-send me-1"></i>Send & Post</button>';
      }
      if (inv.status!=='Cancelled' && inv.status!=='Paid') {
        html+='<button class="btn btn-outline-danger" onclick="App.cancelInvoice(\''+id+'\')"><i class="bi bi-x-circle me-1"></i>Cancel</button>';
      }
      if (inv.status!=='Draft' && inv.status!=='Cancelled') {
        html+='<button class="btn btn-outline-primary" onclick="App.pdfInvoice(\''+id+'\')"><i class="bi bi-filetype-pdf me-1"></i>PDF</button>' +
          '<button class="btn btn-outline-primary" onclick="App.emailInvoice(\''+id+'\')"><i class="bi bi-envelope me-1"></i>Email</button>';
      }
      if (['Sent','Partial','Overdue'].indexOf(inv.status)!==-1) {
        html+='<button class="btn btn-success" onclick="App.showReceiptModal(\''+inv.customer_id+'\',\''+_escAttr(inv.customer_name)+'\',\''+inv.invoice_id+'\','+Utils_toFloat(inv.balance_due)+')"><i class="bi bi-cash me-1"></i>Receive Payment</button>';
      }
      html+='</div></div>' +
        '<div class="detail-meta mb-4">'+
        '<div class="meta-item"><div class="meta-label">Status</div><div>'+_badge(inv.status)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Total</div><div class="meta-value">'+_fmtMoney(inv.total)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Paid</div><div class="meta-value">'+_fmtMoney(inv.amount_paid)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Balance</div><div class="meta-value" style="color:var(--danger);">'+_fmtMoney(inv.balance_due)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Due</div><div class="meta-value">'+_fmtDate(inv.due_date)+'</div></div>' +
        (inv.journal_ref?'<div class="meta-item"><div class="meta-label">Journal</div><div class="meta-value" style="font-size:0.9rem;">'+_esc(inv.journal_ref)+'</div></div>':'') +
        '</div>' +
        '<div class="card mb-3"><div class="card-header"><span>Line Items</span></div>' +
        '<div class="table-container"><table class="table"><thead><tr><th>#</th><th>Item</th><th class="text-end">Qty</th><th class="text-end">Price</th><th class="text-end">Disc%</th><th class="text-end">Tax</th><th class="text-end">Total</th></tr></thead><tbody>';
      (inv.items||[]).forEach(function(it,i) {
        html+='<tr><td>'+(i+1)+'</td><td>'+_esc(it.product_name||it.description)+'</td><td class="text-end">'+it.quantity+'</td>' +
          '<td class="text-end">'+_fmtMoney(it.unit_price)+'</td><td class="text-end">'+(Utils_toFloat(it.discount_percent)>0?it.discount_percent+'%':'-')+'</td>' +
          '<td class="text-end">'+_fmtMoney(it.tax_amount)+'</td><td class="text-end">'+_fmtMoney(it.line_total)+'</td></tr>';
      });
      html+='</tbody><tfoot><tr class="fw-bold"><td colspan="6" class="text-end">Subtotal</td><td class="text-end">'+_fmtMoney(inv.subtotal)+'</td></tr>';
      if (Utils_toFloat(inv.discount_amount)>0) html+='<tr><td colspan="6" class="text-end">Discount</td><td class="text-end">-'+_fmtMoney(inv.discount_amount)+'</td></tr>';
      html+='<tr><td colspan="6" class="text-end">'+(_config.taxName||'VAT')+'</td><td class="text-end">'+_fmtMoney(inv.tax_amount)+'</td></tr>' +
        '<tr class="fw-bold" style="font-size:1.1rem;"><td colspan="6" class="text-end">Total</td><td class="text-end">'+_fmtMoney(inv.total)+'</td></tr>' +
        '</tfoot></table></div></div>';

      // Receipts
      if ((inv.receipts||[]).length) {
        html+='<div class="card"><div class="card-header"><span>Payments Received</span></div><div class="table-container"><table class="table"><thead><tr><th>Receipt #</th><th>Date</th><th>Method</th><th class="text-end">Amount</th><th>Status</th></tr></thead><tbody>';
        inv.receipts.forEach(function(r) {
          html+='<tr><td>'+_esc(r.receipt_number)+'</td><td>'+_fmtDate(r.date)+'</td><td>'+_esc(r.payment_method)+'</td><td class="text-end">'+_fmtMoney(r.amount)+'</td><td>'+_badge(r.status)+'</td></tr>';
        });
        html+='</tbody></table></div></div>';
      }
      c.innerHTML=html;
    });
  }

  function showInvoiceModal(custId, custName) {
    // First load customers and products for dropdowns
    _callModule('customers','list',{filters:{status:'Active'},sort:'name',order:'asc'},function(custResult) {

  function addLineItem() {
    _lineItemCount++;
    var row = '<tr id="li_'+_lineItemCount+'">' +
      '<td><select class="form-select form-select-sm" onchange="App.onProductSelect(this,'+_lineItemCount+')">'+(window._prodOpts||'')+'</select></td>' +
      '<td><input type="number" class="form-control form-control-sm" id="li_qty_'+_lineItemCount+'" value="1" min="1" onchange="App.calcLineTotal('+_lineItemCount+')"></td>' +
      '<td><input type="number" class="form-control form-control-sm" id="li_price_'+_lineItemCount+'" value="0" step="0.01" onchange="App.calcLineTotal('+_lineItemCount+')"></td>' +
      '<td><input type="number" class="form-control form-control-sm" id="li_disc_'+_lineItemCount+'" value="0" min="0" max="100" onchange="App.calcLineTotal('+_lineItemCount+')"></td>' +
      '<td><span id="li_total_'+_lineItemCount+'" class="fw-bold">0.00</span><input type="hidden" id="li_pid_'+_lineItemCount+'"><input type="hidden" id="li_pname_'+_lineItemCount+'"></td>' +

  function onProductSelect(sel, idx) {
    var opt = sel.options[sel.selectedIndex];
    var price = opt.getAttribute('data-price') || 0;
    var name = opt.getAttribute('data-name') || '';
    document.getElementById('li_price_'+idx).value = price;
    document.getElementById('li_pid_'+idx).value = sel.value;
    document.getElementById('li_pname_'+idx).value = name;
    calcLineTotal(idx);
  }

  function calcLineTotal(idx) {
    var qty = parseFloat(document.getElementById('li_qty_'+idx).value)||0;
    var price = parseFloat(document.getElementById('li_price_'+idx).value)||0;
    var disc = parseFloat(document.getElementById('li_disc_'+idx).value)||0;
    var gross = qty * price;
    var net = gross - (gross * disc / 100);
    var taxRate = _config.taxRate || 15;
    var total = net + (net * taxRate / 100);
    document.getElementById('li_total_'+idx).textContent = total.toFixed(2);
  }

  function saveInvoice() {
    var items = [];
    document.querySelectorAll('#lineItemsBody tr').forEach(function(row) {
      var idx = row.id.split('_')[1];
      var qty = parseFloat(document.getElementById('li_qty_'+idx).value)||0;
      var price = parseFloat(document.getElementById('li_price_'+idx).value)||0;
      if (qty > 0 && price > 0) {
        items.push({
          product_id: document.getElementById('li_pid_'+idx).value,
          product_name: document.getElementById('li_pname_'+idx).value,
          quantity: qty,
          unit_price: price,
          discount_percent: parseFloat(document.getElementById('li_disc_'+idx).value)||0,
          tax_rate: _config.taxRate||15
        });
      }
    });
    if (items.length===0) { showToast('Add at least one item','warning'); return; }
    var data = {
      customer_id: document.getElementById('f_customer').value,
      date: document.getElementById('f_date').value,
      send: document.getElementById('f_send').checked,
      notes: document.getElementById('f_notes').value,
      items: items
    };
    showLoading(true);
    _callModule('invoices','create',data,function(r) {
      showLoading(false); _hideModal();
      showToast('Invoice '+r.number+' created ('+r.status+')','success');
      navigate('invoices',{view:r.id});
    },function(e){showLoading(false);showToast(e.message,'danger');});
  }

          opts+='<option value="'+inv.invoice_id+'" data-balance="'+inv.balance_due+'">'+_esc(inv.invoice_number)+' - Balance: '+_fmtMoney(inv.balance_due)+'</option>';

      invSel.innerHTML=opts;
      invSel.onchange=function() {
        var opt=invSel.options[invSel.selectedIndex];

      '<div id="periodsList"><div class="module-loading"><div class="spinner-border text-primary"></div></div></div>';

  function _loadPeriods() {
    google.script.run.withSuccessHandler(function(periods){
      var html='<div class="card"><div class="card-header">Period History</div><div class="table-container"><table class="table"><thead><tr><th>Period</th><th>Status</th><th class="text-end">Net Income</th><th>Closed By</th><th>Closed At</th><th></th></tr></thead><tbody>';

  function doClosePeriod() {
    var period=document.getElementById('closePeriod').value;
    if(!period){showToast('Select a period','warning');return;}
    var html='<div class="modal fade" id="crudModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">' +
      '<div class="modal-header"><h5><i class="bi bi-lock me-2 text-warning"></i>Close Period '+period+'</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>' +
      '<div class="modal-body"><div class="alert alert-warning mb-2"><i class="bi bi-exclamation-triangle me-2"></i>This posts a closing entry transferring net income to Retained Earnings and locks '+period+' against new postings.</div>' +
      '<label class="form-label">Notes (optional)</label><textarea class="form-control" id="closeNotes" rows="2"></textarea></div>' +
      '<div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>' +
      '<button class="btn btn-warning" onclick="App._doCloseConfirmed(\''+period+'\')"><i class="bi bi-lock me-1"></i>Close Period</button></div></div></div></div>';
    _showModal(html);
  }
  function _doCloseConfirmed(period) {
    var notes=(document.getElementById('closeNotes')||{}).value||'';
    _hideModal();showLoading(true);
    google.script.run.withSuccessHandler(function(r){
      showLoading(false);
      showToast('Period '+r.period+' closed. Net income: '+_fmtMoney(r.netIncome),'success');
      _loadPeriods();
    }).withFailureHandler(function(e){showLoading(false);showToast(e.message,'danger');}).closePeriod({period:period,notes:notes});
  }
  function doReopenPeriod(period) {
    var html='<div class="modal fade" id="crudModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">' +
      '<div class="modal-header"><h5><i class="bi bi-unlock me-2 text-danger"></i>Reopen Period '+period+'</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>' +
      '<div class="modal-body"><div class="alert alert-danger mb-2"><i class="bi bi-exclamation-octagon me-2"></i>Reopening reverses the closing entry and unlocks the period. Admin only.</div>' +
      '<label class="form-label">Reason *</label><input class="form-control" id="reopenReason" placeholder="Why is this period being reopened?"></div>' +
      '<div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>' +
      '<button class="btn btn-danger" onclick="App._doReopenConfirmed(\''+period+'\')"><i class="bi bi-unlock me-1"></i>Reopen</button></div></div></div></div>';
    _showModal(html);
  }
  function _doReopenConfirmed(period) {
    var reason=(document.getElementById('reopenReason')||{}).value||'';
    if(!reason){showToast('Reason required','warning');return;}
    _hideModal();showLoading(true);
    google.script.run.withSuccessHandler(function(r){
      showLoading(false);showToast('Period '+r.period+' reopened','success');_loadPeriods();
    }).withFailureHandler(function(e){showLoading(false);showToast(e.message,'danger');}).reopenPeriod({period:period,reason:reason});

        return '<div class="d-flex align-items-center mb-2"><i class="bi bi-'+(ch.passed?'check-circle-fill text-success':'x-circle-fill text-danger')+' me-2"></i>' +
          '<div><div class="fw-bold">'+_esc(ch.name)+'</div><div class="small text-muted">'+_esc(ch.detail)+'</div></div></div>';
      }).join('');
      var html='<div class="modal fade" id="crudModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">' +
        '<div class="modal-header"><h5><i class="bi bi-shield-'+(res.valid?'check text-success':'exclamation text-danger')+' me-2"></i>Books Validation</h5>' +
        '<button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body">' +
        '<div class="alert '+(res.valid?'alert-success':'alert-danger')+'">'+(res.valid?'All integrity checks passed — your books are balanced.':'One or more checks failed. See details below.')+'</div>' +
        rows+'</div><div class="modal-footer"><button class="btn btn-primary" data-bs-dismiss="modal">Close</button></div></div></div></div>';

  function _addJournalLine() {
    var tbody=document.querySelector('#je_lines tbody');
    var tr=document.createElement('tr');
    tr.innerHTML='<td><select class="form-select form-select-sm je-acct">'+_journalAccountOptions()+'</select></td>' +
      '<td><input type="number" step="0.01" class="form-control form-control-sm text-end je-dr" oninput="App._recalcJournal()" placeholder="0.00"></td>' +
      '<td><input type="number" step="0.01" class="form-control form-control-sm text-end je-cr" oninput="App._recalcJournal()" placeholder="0.00"></td>' +
      '<td><button class="btn btn-sm btn-link text-danger" onclick="this.closest(\'tr\').remove();App._recalcJournal()"><i class="bi bi-trash"></i></button></td>';
    tbody.appendChild(tr);

  function _recalcJournal() {
    var dr=0,cr=0;
    document.querySelectorAll('#je_lines .je-dr').forEach(function(i){dr+=parseFloat(i.value)||0;});
    document.querySelectorAll('#je_lines .je-cr').forEach(function(i){cr+=parseFloat(i.value)||0;});
    document.getElementById('je_totDr').textContent=dr.toFixed(2);
    document.getElementById('je_totCr').textContent=cr.toFixed(2);

  function _showModal(html) {
    // Remove existing modal
    var existing=document.getElementById('crudModal');
    if(existing) existing.remove();
    var backdrop=document.querySelector('.modal-backdrop');
    if(backdrop) backdrop.remove();
    document.body.insertAdjacentHTML('beforeend', html);
    var modal=new bootstrap.Modal(document.getElementById('crudModal'));
    modal.show();
  }
  function _hideModal() {
    var el=document.getElementById('crudModal');
    if(el){
      // Bootstrap sets aria-hidden="true" on the modal as it starts to hide.
      // If the element that triggered hide() (e.g. the Save button) still has
      // focus and lives inside the modal, the browser blocks aria-hidden and
      // logs "Blocked aria-hidden on an element because its descendant
      // retained focus" — harmless on its own, but a sign focus wasn't moved
      // out of the modal first. Blur whatever's focused inside it before
      // hiding so the modal can close cleanly.
      var active=document.activeElement;
      if(active && el.contains(active)) active.blur();
      var m=bootstrap.Modal.getInstance(el);if(m)m.hide();
    }
  }

  /**
   * Show exactly which spreadsheet this deployment is connected to.
   *
   * Apps Script web apps resolve their database server-side and silently
   * auto-create a brand new spreadsheet if that resolution ever comes up
   * empty (a redeploy, a copied script, a reset property). When that
   * happens, the app keeps working — it just reads and writes a DIFFERENT
   * file than whichever one a person has open in their browser, producing
   * confusing symptoms like "this record already exists" for something they
   * can't find, or a Users list that looks empty despite a user clearly
   * being in their sheet. This shows the live spreadsheet name, URL, and a
   * couple of row counts to check against.
   */
  function _buildVersionBanner(serverVersion) {
    var sv = serverVersion || 'unknown';
    var match = (sv === BUILD_TAG);
    if (match) {
      return '<div class="alert alert-success py-2 small mb-3"><i class="bi bi-check-circle me-1"></i>' +
        'Server and browser are running the same build (<code>' + _esc(sv) + '</code>). ' +
        'The deployed code is current.</div>';
    }
    return '<div class="alert alert-danger py-2 small mb-3"><i class="bi bi-exclamation-triangle me-1"></i>' +
      '<strong>Build mismatch — the browser is running OLD code.</strong><br>' +
      'Server code: <code>' + _esc(sv) + '</code> &nbsp; vs &nbsp; Browser bundle: <code>' + _esc(BUILD_TAG) + '</code><br>' +
      'This means a new deployment version was not published, or your browser cached an old page. ' +
      'Fix: in the Apps Script editor, <strong>Deploy → Manage deployments → edit → Version: New version → Deploy</strong>, ' +
      'then hard-reload this page (Ctrl+Shift+R).</div>';
  }

            ? '<code class="small">' + _esc(typeof s.detail === 'object' ? JSON.stringify(s.detail) : String(s.detail)) + '</code>'
            : '<span class="text-danger small">' + _esc(s.error || '') + '</span>';
          return '<tr><td>' + icon + '</td><td class="small">' + _esc(s.step) + '</td><td>' + detail + '</td></tr>';
        }).join('');

          ? '<div class="alert alert-success"><strong>PASS.</strong> ' + _esc(report.summary) + '</div>'
          : '<div class="alert alert-danger"><strong>Problem found.</strong> ' + _esc(report.summary) + '</div>';

  function _runInitDatabase() {
    _hideModal();
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(r) {
        showLoading(false);
        // Show detailed results in a modal
        var det = r.details || {};
        var rows = [
          {label: 'Sheets Created',   items: det.created   || [], color: 'success'},
          {label: 'Sheets Validated', items: det.validated || [], color: 'info'},
          {label: 'Sheets Repaired',  items: det.repaired  || [], color: 'warning'},
          {label: 'Data Seeded',      items: det.seeded    || [], color: 'primary'},
          {label: 'Errors',           items: det.errors    || [], color: 'danger'}
        ].filter(function(row) { return row.items.length > 0; });

        var body = rows.length
          ? rows.map(function(row) {

  function _renderProducts(c, params) {
    if (params && params.view) { _renderProductDetail(c, params.view); return; }
    _loading(c);
    _callModule('products','list',{sort:'name',order:'asc'},function(result) {
      var rows = _data(result);
      var html = '<div class="module-toolbar">' +
        '<div class="search-box"><i class="bi bi-search"></i><input class="form-control" placeholder="Search products..." oninput="App._filterTable(this)"></div>' +
        '<div class="d-flex gap-2">' +
        '<button class="btn btn-outline-secondary" onclick="App.navigate(\'inv-valuation\')"><i class="bi bi-bar-chart me-1"></i>Valuation</button>' +
        '<button class="btn btn-primary" onclick="App.showProductModal()"><i class="bi bi-plus-lg me-1"></i>New Product</button></div></div>' +
        '<div class="card"><div class="table-container"><table class="table table-hover" id="dataTable"><thead><tr>' +
        '<th>SKU</th><th>Name</th><th>Category</th><th class="text-end">Cost</th><th class="text-end">Price</th><th class="text-end">Stock</th><th>Valuation</th><th>Status</th></tr></thead><tbody>';
      rows.forEach(function(r) {
        if (r.status === 'Inactive') return;
        var qty = parseFloat(r.quantity_on_hand)||0;
        var reorder = parseFloat(r.reorder_level)||0;
        var stockStatus = qty <= 0 ? 'out_of_stock' : (qty <= reorder ? 'low' : 'ok');
        var vm = (r.valuation_method||'wa').toLowerCase() === 'fifo' ? 'fifo' : 'wa';
        var qtyClass = qty <= 0 ? 'qty-negative' : (qty <= reorder ? 'qty-negative' : 'qty-positive');
        html += '<tr onclick="App.navigate(\'products\',{view:\''+ r.product_id +'\'})">'  +
          '<td><code>'+_esc(r.sku)+'</code></td><td>'+_esc(r.name)+'</td><td>'+_esc(r.category||'—')+'</td>' +
          '<td class="text-end">'+_fmtMoney(r.cost_price)+'</td>' +
          '<td class="text-end">'+_fmtMoney(r.unit_price)+'</td>' +
          '<td class="text-end"><span class="'+qtyClass+'">'+qty+'</span> <small class="text-muted">'+_esc(r.unit||'')+'</small></td>' +
          '<td><span class="valuation-badge '+ vm +"'>" + (vm === 'fifo' ? 'FIFO' : 'W.Avg') + '</span></td>' +
          '<td>'+_badge(stockStatus.replace(/_/g,' '))+'</td></tr>';
      });
      if (!rows.length) html += '<tr><td colspan="8" class="empty-state"><i class="bi bi-box-seam"></i>No products yet</td></tr>';
      html += '</tbody></table></div></div>';
      c.innerHTML = html;
    });

  function _renderProductDetail(c, id) {
    _loading(c);
    _callModule('products','get',{id:id},function(prod) {
      var qty = parseFloat(prod.quantity_on_hand)||0;
      var reorder = parseFloat(prod.reorder_level)||0;
      var stockStatus = qty <= 0 ? 'out_of_stock' : (qty <= reorder ? 'low' : 'ok');
      var pct = reorder > 0 ? Math.min(100, Math.round(qty/reorder*100)) : (qty > 0 ? 100 : 0);
      var barCls = qty <= 0 ? 'critical' : (qty <= reorder ? 'low' : 'ok');

        '<div class="detail-header"><div><h4>'+_esc(prod.name)+'</h4><p class="text-muted mb-0"><code>'+_esc(prod.sku)+'</code> &middot; '+_esc(prod.category||'Uncategorised')+'</p></div>' +
        '<div class="action-btn-group">' +
        '<button class="btn btn-outline-primary" onclick="App.showProductModal('+JSON.stringify({product_id:prod.product_id,name:prod.name,sku:prod.sku,category:prod.category,unit:prod.unit,unit_price:prod.unit_price,cost_price:prod.cost_price,reorder_level:prod.reorder_level,reorder_quantity:prod.reorder_quantity,valuation_method:prod.valuation_method,location:prod.location,notes:prod.description}).replace(/"/g,'&quot;')+')"><i class="bi bi-pencil me-1"></i>Edit</button>' +
        '<button class="btn btn-success" onclick="App.showAdjustModal(\''+ id +'\',\''+ _escAttr(prod.name)+'\','+ qty +')"><i class="bi bi-plus-slash-minus me-1"></i>Adjust Stock</button>' +
        '<button class="btn btn-warning" onclick="App.showDamageModal(\''+ id +'\',\''+ _escAttr(prod.name)+'\','+ qty +')"><i class="bi bi-exclamation-triangle me-1"></i>Record Damage</button>' +
        '<button class="btn btn-outline-secondary" onclick="App.showTransferModal(\''+ id +'\',\''+ _escAttr(prod.name)+'\','+ qty +',\''+ _escAttr(prod.location||'')+'\')"><i class="bi bi-arrows-move me-1"></i>Transfer</button>' +
        '</div></div>' +
        '<div class="detail-meta mb-4">' +
        '<div class="meta-item"><div class="meta-label">Stock Qty</div><div class="meta-value" style="color:'+( qty<=0?'var(--danger)':qty<=reorder?'var(--warning)':'var(--success)')+';">'+qty+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Cost Price</div><div class="meta-value">'+_fmtMoney(prod.cost_price)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Unit Price</div><div class="meta-value">'+_fmtMoney(prod.unit_price)+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Stock Value</div><div class="meta-value">'+_fmtMoney(qty*(parseFloat(prod.cost_price)||0))+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Reorder At</div><div class="meta-value">'+reorder+'</div></div>' +
        '<div class="meta-item"><div class="meta-label">Status</div><div>'+_badge(stockStatus.replace(/_/g,' '))+'</div></div>' +
        '</div>' +
        '<div class="card mb-3"><div class="card-body pb-1">' +
        '<div class="d-flex justify-content-between mb-1 small"><span>Stock level vs reorder</span><span>'+qty+' / '+reorder+'</span></div>' +
        '<div class="stock-level-bar"><div class="stock-level-fill '+ barCls +'" style="width:'+ pct +'%"></div></div></div></div>' +
        '<div class="card"><div class="card-header"><span>Recent Transactions</span>' +
        '<button class="btn btn-sm btn-outline-secondary" onclick="App.navigate(\'inv-txns\',{product_id:\''+ id +'\'})"><i class="bi bi-list-ul me-1"></i>All</button></div>' +
        '<div class="table-container"><table class="table"><thead><tr><th>Date</th><th>Type</th><th class="text-end">Qty</th><th class="text-end">Unit Cost</th><th class="text-end">Running Qty</th><th>Ref</th></tr></thead><tbody>';

      (prod.recentTransactions||[]).forEach(function(t) {
        var q = parseFloat(t.quantity)||0;
        var qClass = q > 0 ? 'qty-positive' : (q < 0 ? 'qty-negative' : 'qty-zero');
        var txTypeLower = (t.type||'').toLowerCase().replace(/ /g,'_');
        html += '<tr><td>'+_fmtDate(t.date)+'</td><td>'+_badge(txTypeLower)+'</td>' +
          '<td class="text-end"><span class="'+ qClass +'">'+( q > 0 ? '+':'' )+q+'</span></td>' +
          '<td class="text-end">'+_fmtMoney(t.unit_cost)+'</td>' +
          '<td class="text-end">'+( parseFloat(t.running_qty)||'—' )+'</td>' +
          '<td class="small text-muted">'+_esc(t.reference_type||'')+'</td></tr>';
      });
      if (!(prod.recentTransactions||[]).length) {
        html += '<tr><td colspan="6" class="text-center text-muted py-3">No transactions yet</td></tr>';

      c.innerHTML = html;
    });

  function saveProduct(existingId) {
    var cat = document.getElementById('fp_cat');
    var data = {
      name:             document.getElementById('fp_name').value,
      sku:              document.getElementById('fp_sku').value,
      category:         cat ? cat.value : '',
      unit:             document.getElementById('fp_unit').value,
      cost_price:       parseFloat(document.getElementById('fp_cost').value)||0,
      unit_price:       parseFloat(document.getElementById('fp_price').value)||0,
      tax_rate:         parseFloat(document.getElementById('fp_tax').value)||0,
      valuation_method: document.getElementById('fp_vm').value,
      reorder_level:    parseFloat(document.getElementById('fp_reorder').value)||0,
      reorder_quantity: parseFloat(document.getElementById('fp_reorderqty').value)||0,
      location:         document.getElementById('fp_loc').value,
      description:      document.getElementById('fp_desc').value
    };
    var oqEl = document.getElementById('fp_openqty');
    if (oqEl) data.quantity_on_hand = parseFloat(oqEl.value)||0;
    if (existingId) data.product_id = existingId;
    if (!data.name) { showToast('Product name required','warning'); return; }
    showLoading(true);
    _callModule('products', existingId ? 'update' : 'create', data, function(r) {
      showLoading(false); _hideModal();
      showToast('Product '+(existingId?'updated':'created')+'! SKU: '+(r.sku||'—'), 'success');
      if (!existingId) navigate('products',{view:r.id});
      else navigate('products',{view:existingId});
    }, function(e){ showLoading(false); showToast(e.message,'danger'); });
  }

  function saveAdjust(productId, currentQty) {
    var adjType = document.getElementById('adj_type').value;
    var qty     = parseFloat(document.getElementById('adj_qty').value)||0;
    var date    = document.getElementById('adj_date').value;
    var reason  = document.getElementById('adj_reason').value;

    var data = { product_id: productId, date: date, reason: reason,
      notes: document.getElementById('adj_notes').value };

    if (adjType === 'count')  { data.quantity_counted = qty; }
    else if (adjType === 'add') { data.quantity = qty; }
    else                         { data.quantity = -qty; }

    if (!reason) { showToast('Reason is required','warning'); return; }
    showLoading(true);
    google.script.run
      .withSuccessHandler(function(r) {
        showLoading(false); _hideModal();
        showToast('Adjustment saved. Variance: '+(r.variance>0?'+':'')+r.variance+'. Journal: '+(r.journalRef||'—'), 'success');
        navigate('products',{view:productId});
      })
      .withFailureHandler(function(e){ showLoading(false); showToast(e.message,'danger'); })
      .adjustStock(data);
  }

  function saveDamage(productId) {

  function _renderInventoryTxns(c, params) {

      html += '</tbody></table></div></div>';
      c.innerHTML = html;

  function _filterTxnType() {
    var sel = document.getElementById('txnTypeFilter');
    var val = sel ? sel.value.toLowerCase() : '';
    var rows = document.querySelectorAll('#dataTable tbody tr');

  function _applyStructure() {
    var sel=document.getElementById('emp_struct');
    var sid=sel?sel.value:'';
    if(!sid)return;
    var s=(_payrollStructures||[]).filter(function(x){return x.structure_id===sid;})[0];
    if(!s)return;
    document.getElementById('emp_basic').value=s.basic_salary||0;
    document.getElementById('emp_transport').value=s.transport_allowance||0;
    document.getElementById('emp_housing').value=s.housing_allowance||0;
    document.getElementById('emp_other').value=s.other_allowance||0;
  }

  function saveEmployee(existingId) {
    var data={
      first_name:document.getElementById('emp_fn').value,
      last_name:document.getElementById('emp_ln').value,
      email:document.getElementById('emp_email').value,
      phone:document.getElementById('emp_phone').value,
      position:document.getElementById('emp_pos').value,
      department:document.getElementById('emp_dept').value,
      employment_type:document.getElementById('emp_type').value,
      basic_salary:parseFloat(document.getElementById('emp_basic').value)||0,
      transport_allowance:parseFloat(document.getElementById('emp_transport').value)||0,
      housing_allowance:parseFloat(document.getElementById('emp_housing').value)||0,
      other_allowance:parseFloat(document.getElementById('emp_other').value)||0,
      ssnit_applicable:document.getElementById('emp_ssnit').checked,
      paye_applicable:document.getElementById('emp_paye').checked,
      bank_name:document.getElementById('emp_bank').value,
      bank_account:document.getElementById('emp_acct').value,
      pension_id:document.getElementById('emp_pension').value,
      tax_id:document.getElementById('emp_tax').value
    };
    var structEl=document.getElementById('emp_struct');

    showLoading(true);

      showLoading(false);_hideModal();showToast('Employee saved','success');
      navigate('employees',existingId?{view:existingId}:undefined);
    },function(e){showLoading(false);showToast(e.message,'danger');});
  }

  function _renderPayrollRuns(c, params) {
    if (params && params.view) { _renderPayrollRunDetail(c, params.view); return; }
    _loading(c);
    _callModule('payroll','list',{sort:'period',order:'desc'},function(result){
      var rows=_data(result);
      var thisMonth=new Date().toISOString().slice(0,7);
      var html='<div class="card mb-3"><div class="card-body d-flex flex-wrap gap-2 align-items-end">' +
        '<div><label class="form-label small mb-1">Period to run</label><input type="month" class="form-control form-control-sm" id="payPeriod" value="'+thisMonth+'"></div>' +
        '<button class="btn btn-sm btn-outline-primary" onclick="App.previewPayrollRun()"><i class="bi bi-eye me-1"></i>Preview</button>' +
        '<button class="btn btn-sm btn-primary" onclick="App.processPayrollRun()"><i class="bi bi-play-fill me-1"></i>Process</button>' +
        '</div></div><div id="payPreview"></div>' +
        '<div class="card"><div class="card-header">Payroll History</div><div class="table-container"><table class="table table-hover"><thead><tr>' +
        '<th>Period</th><th class="text-end">Employees</th><th class="text-end">Gross</th><th class="text-end">PAYE</th><th class="text-end">SSNIT</th><th class="text-end">Net</th><th>Status</th></tr></thead><tbody>';
      rows.forEach(function(r){
        html+='<tr onclick="App.navigate(\'payroll-runs\',{view:\''+r.payroll_id+'\'})"><td><strong>'+_esc(r.period)+'</strong></td>' +
          '<td class="text-end">'+(r.employee_count||0)+'</td><td class="text-end">'+_fmtMoney(r.total_gross)+'</td>' +
          '<td class="text-end">'+_fmtMoney(r.total_paye)+'</td><td class="text-end">'+_fmtMoney((parseFloat(r.total_pension_employee)||0)+(parseFloat(r.total_pension_employer)||0))+'</td>' +
          '<td class="text-end fw-bold">'+_fmtMoney(r.total_net)+'</td><td>'+_badge(r.status)+'</td></tr>';
      });
      if(!rows.length) html+='<tr><td colspan="7" class="text-center text-muted py-3">No payroll runs yet</td></tr>';
      html+='</tbody></table></div></div>';
      c.innerHTML=html;
    });
  }

  function previewPayrollRun() {
    var period=document.getElementById('payPeriod').value;
    if(!period){showToast('Select a period','warning');return;}
    var el=document.getElementById('payPreview');
    el.innerHTML='<div class="module-loading"><div class="spinner-border text-primary"></div></div>';
    google.script.run.withSuccessHandler(function(prev){
      el.innerHTML=_payrollPreviewCard(prev,period,false);
    }).withFailureHandler(function(e){el.innerHTML='<div class="alert alert-danger">'+e.message+'</div>';}).previewPayroll({period:period});
  }

  function processPayrollRun() {
    var period=document.getElementById('payPeriod').value;
    if(!period){showToast('Select a period','warning');return;}
    var html='<div class="modal fade" id="crudModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">' +
      '<div class="modal-header"><h5><i class="bi bi-cash-stack me-2 text-primary"></i>Process Payroll '+period+'</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>' +
      '<div class="modal-body"><div class="alert alert-info mb-0"><i class="bi bi-info-circle me-2"></i>This will generate payslips for all active employees and post the payroll journal to accounting. Run a preview first to review the figures.</div></div>' +
      '<div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>' +
      '<button class="btn btn-primary" onclick="App._doProcessPayroll(\''+period+'\')"><i class="bi bi-play-fill me-1"></i>Process & Post</button></div></div></div></div>';
    _showModal(html);
  }

  function _doProcessPayroll(period) {
    _hideModal();showLoading(true);
    google.script.run.withSuccessHandler(function(r){
      showLoading(false);
      showToast('Payroll '+period+' processed. Journal: '+(r.journalRef||'—')+'. Net: '+_fmtMoney(r.totals.net_pay),'success');
      navigate('payroll-runs',{view:r.payrollId});
    }).withFailureHandler(function(e){showLoading(false);showToast(e.message,'danger');}).processPayroll({period:period});
  }

  function _payrollPreviewCard(prev, period, processed) {

      return '<tr><td>'+_esc(l.employee_name)+'</td><td class="text-end">'+_fmtMoney(l.gross_pay,sym)+'</td>' +

        '<td class="text-end fw-bold">'+_fmtMoney(l.net_pay,sym)+'</td></tr>';

    return '<div class="card mb-3 border-primary"><div class="card-header bg-primary text-white">Preview — '+period+' ('+prev.employeeCount+' employees)</div>' +
      '<div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>Employee</th><th class="text-end">Gross</th><th class="text-end">SSNIT</th><th class="text-end">PAYE</th><th class="text-end">Net</th></tr></thead><tbody>' +

      '<td class="text-end">'+_fmtMoney(t.pension_employee,sym)+'</td><td class="text-end">'+_fmtMoney(t.paye_tax,sym)+'</td>' +
      '<td class="text-end">'+_fmtMoney(t.net_pay,sym)+'</td></tr></tfoot></table></div>' +
      '<div class="card-footer small text-muted">Employer SSNIT: '+_fmtMoney(t.pension_employer,sym)+' &middot; Total employer cost: '+_fmtMoney(t.employer_cost,sym)+'</div></div>';
  }

  function _doPayNet(payrollId) {

  // ============================================================
  // REPORTS
  // ============================================================
  function _renderReports(c, params) {
    _loading(c);
    google.script.run.withSuccessHandler(function(res){
      var reports=_data(res);
      var groups={};
      reports.forEach(function(r){ (groups[r.group]=groups[r.group]||[]).push(r); });
      var today=new Date().toISOString().split('T')[0];
      var yearStart=new Date(new Date().getFullYear(),0,1).toISOString().split('T')[0];
      var monthStr=new Date().toISOString().slice(0,7);
      var groupHtml=Object.keys(groups).map(function(g){
        var cards=groups[g].map(function(r){
          return '<button class="report-card" onclick="App.runReport(\''+r.id+'\')"><i class="bi bi-file-earmark-text"></i><span>'+_esc(r.name)+'</span></button>';
        }).join('');
        return '<div class="report-group"><div class="report-group-title">'+_esc(g)+'</div><div class="report-card-grid">'+cards+'</div></div>';
      }).join('');
      c.innerHTML='<div class="card mb-3"><div class="card-body d-flex flex-wrap gap-2 align-items-end">' +
        '<div><label class="form-label small mb-1">Period Start</label><input type="date" class="form-control form-control-sm" id="rpStart" value="'+yearStart+'"></div>' +
        '<div><label class="form-label small mb-1">Period End / As of</label><input type="date" class="form-control form-control-sm" id="rpEnd" value="'+today+'"></div>' +
        '<div class="text-muted small ms-2">Date filters apply to period-based reports.</div>' +
        '</div></div>' + groupHtml +
        '<div id="reportOutput" class="mt-3"></div>';
      if(params&&params.report) runReport(params.report);
    }).withFailureHandler(function(e){c.innerHTML='<div class="alert alert-danger">'+e.message+'</div>';}).listReports();
  }

  function runReport(id) {
    var start=(document.getElementById('rpStart')||{}).value;
    var end=(document.getElementById('rpEnd')||{}).value;
    var out=document.getElementById('reportOutput');
    out.innerHTML='<div class="module-loading"><div class="spinner-border text-primary"></div></div>';
    out.scrollIntoView({behavior:'smooth',block:'start'});
    google.script.run.withSuccessHandler(function(data){
      out.innerHTML=_renderReportOutput(id,data,start,end);
    }).withFailureHandler(function(e){out.innerHTML='<div class="alert alert-danger">'+e.message+'</div>';})
      .generateReport({report:id,start:start,end:end,asOf:end});
  }

  function _renderReportOutput(id, d, start, end) {
    var sym=_config.currencySymbol||'GH₵';
    var hdr=function(t,sub){return '<div class="report-header"><h4>'+t+'</h4><div class="text-muted small">'+(sub||'')+'</div></div>';};

    if(id==='profit_loss'){
      var rows='';
      rows+='<tr class="table-light"><td colspan="2"><strong>Revenue</strong></td></tr>';
      (d.revenue||[]).forEach(function(r){rows+='<tr><td class="ps-3">'+_esc(r.name)+'</td><td class="text-end">'+_fmtMoney(r.amount,sym)+'</td></tr>';});
      rows+='<tr class="fw-bold"><td class="ps-3">Total Revenue</td><td class="text-end">'+_fmtMoney(d.totalRevenue,sym)+'</td></tr>';
      rows+='<tr class="table-light"><td colspan="2"><strong>Cost of Goods Sold</strong></td></tr>';
      (d.cogs||[]).forEach(function(r){rows+='<tr><td class="ps-3">'+_esc(r.name)+'</td><td class="text-end">'+_fmtMoney(r.amount,sym)+'</td></tr>';});
      rows+='<tr class="fw-bold"><td class="ps-3">Gross Profit</td><td class="text-end">'+_fmtMoney(d.grossProfit,sym)+'</td></tr>';
      rows+='<tr class="table-light"><td colspan="2"><strong>Operating Expenses</strong></td></tr>';
      (d.expenses||[]).forEach(function(r){rows+='<tr><td class="ps-3">'+_esc(r.name)+'</td><td class="text-end">'+_fmtMoney(r.amount,sym)+'</td></tr>';});
      rows+='<tr class="fw-bold"><td class="ps-3">Total Expenses</td><td class="text-end">'+_fmtMoney(d.totalExpenses,sym)+'</td></tr>';
      rows+='<tr class="'+(d.netProfit>=0?'table-success':'table-danger')+' fw-bold"><td>Net '+(d.netProfit>=0?'Profit':'Loss')+'</td><td class="text-end">'+_fmtMoney(d.netProfit,sym)+'</td></tr>';
      return hdr('Profit &amp; Loss Statement',start+' to '+end+' · Gross margin '+d.grossMargin+'% · Net margin '+d.netMargin+'%') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><tbody>'+rows+'</tbody></table></div></div>';
    }

    if(id==='balance_sheet'){
      var sec=function(title,items){var h='<tr class="table-light"><td colspan="2"><strong>'+title+'</strong></td></tr>';(items||[]).forEach(function(r){h+='<tr><td class="ps-3">'+_esc(r.name)+'</td><td class="text-end">'+_fmtMoney(r.amount,sym)+'</td></tr>';});return h;};
      return hdr('Balance Sheet','As of '+d.asOf+' · <span class="badge '+(d.balanced?'bg-success':'bg-danger')+'">'+(d.balanced?'Balanced':'Out by '+_fmtMoney(d.difference,sym))+'</span>') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><tbody>' +
        sec('Assets',d.assets)+'<tr class="fw-bold"><td>Total Assets</td><td class="text-end">'+_fmtMoney(d.totalAssets,sym)+'</td></tr>' +
        sec('Liabilities',d.liabilities)+'<tr class="fw-bold"><td>Total Liabilities</td><td class="text-end">'+_fmtMoney(d.totalLiabilities,sym)+'</td></tr>' +
        sec('Equity',d.equity)+'<tr class="fw-bold"><td>Total Equity</td><td class="text-end">'+_fmtMoney(d.totalEquity,sym)+'</td></tr>' +
        '<tr class="table-active fw-bold"><td>Liabilities + Equity</td><td class="text-end">'+_fmtMoney(d.totalLiabilitiesAndEquity,sym)+'</td></tr>' +
        '</tbody></table></div></div>';
    }

    if(id==='cash_flow'){
      var blk=function(title,items,total){var h='<tr class="table-light"><td colspan="2"><strong>'+title+'</strong></td></tr>';(items||[]).forEach(function(r){h+='<tr><td class="ps-3">'+_esc(r.label)+'</td><td class="text-end '+(r.amount<0?'text-danger':'')+'">'+_fmtMoney(r.amount,sym)+'</td></tr>';});h+='<tr class="fw-bold"><td class="ps-3">Net '+title+'</td><td class="text-end">'+_fmtMoney(total,sym)+'</td></tr>';return h;};
      return hdr('Cash Flow Statement',start+' to '+end+' · <span class="badge '+(d.reconciled?'bg-success':'bg-warning')+'">'+(d.reconciled?'Reconciled':'Diff '+_fmtMoney(d.difference,sym))+'</span>') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><tbody>' +
        blk('Operating Activities',d.operating,d.operatingTotal) +
        blk('Investing Activities',d.investing,d.investingTotal) +
        blk('Financing Activities',d.financing,d.financingTotal) +
        '<tr class="table-active fw-bold"><td>Net Change in Cash</td><td class="text-end">'+_fmtMoney(d.netChange,sym)+'</td></tr>' +
        '<tr><td class="small text-muted">Actual cash/bank movement</td><td class="text-end small text-muted">'+_fmtMoney(d.actualCashChange,sym)+'</td></tr>' +
        '</tbody></table></div></div>';
    }

    if(id==='trial_balance'){
      var rows='';
      (d.accounts||[]).forEach(function(a){rows+='<tr><td>'+_esc(a.accountCode)+'</td><td>'+_esc(a.accountName)+'</td><td class="text-end">'+(a.debit?_fmtMoney(a.debit,sym):'-')+'</td><td class="text-end">'+(a.credit?_fmtMoney(a.credit,sym):'-')+'</td></tr>';});
      return hdr('Trial Balance','<span class="badge '+(d.balanced?'bg-success':'bg-danger')+'">'+(d.balanced?'Balanced':'Unbalanced')+'</span>') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>Code</th><th>Account</th><th class="text-end">Debit</th><th class="text-end">Credit</th></tr></thead><tbody>'+rows +
        '</tbody><tfoot><tr class="fw-bold"><td colspan="2" class="text-end">Totals</td><td class="text-end">'+_fmtMoney(d.totalDebits,sym)+'</td><td class="text-end">'+_fmtMoney(d.totalCredits,sym)+'</td></tr></tfoot></table></div></div>';
    }

    if(id==='general_ledger'){
      var html=hdr('General Ledger',start+' to '+end);
      (d.accounts||[]).forEach(function(a){
        if(!a.entries.length&&!a.opening&&!a.closing)return;
        html+='<div class="card mb-2"><div class="card-header d-flex justify-content-between"><span><strong>'+_esc(a.code)+'</strong> '+_esc(a.name)+'</span><span class="small">Opening '+_fmtMoney(a.opening,sym)+' · Closing <strong>'+_fmtMoney(a.closing,sym)+'</strong></span></div>' +
          '<div class="table-container"><table class="table table-sm mb-0"><tbody>';
        a.entries.forEach(function(e){html+='<tr><td>'+_fmtDate(e.date)+'</td><td><small>'+_esc(e.description)+'</small></td><td class="text-end">'+(e.debit?_fmtMoney(e.debit,sym):'-')+'</td><td class="text-end">'+(e.credit?_fmtMoney(e.credit,sym):'-')+'</td></tr>';});
        html+='</tbody></table></div></div>';
      });
      return html;
    }

    if(id==='ar_aging'||id==='ap_aging'){
      var isAR=id==='ar_aging';
      var t=d.totals||{};
      var buckets=[['Current','current'],['1-30','days30'],['31-60','days60'],['61-90','days90'],['90+','over90']];
      var head=buckets.map(function(b){return '<th class="text-end">'+b[0]+'</th>';}).join('');
      var totalRow=buckets.map(function(b){return '<td class="text-end">'+_fmtMoney(t[b[1]],sym)+'</td>';}).join('');
      // Detail rows
      var allItems=[];
      buckets.forEach(function(b){(d[b[1]]||[]).forEach(function(it){it._bucket=b[0];allItems.push(it);});});
      var detail=allItems.map(function(it){
        return '<tr><td>'+_esc(isAR?(it.invoice_number||it.customer_name):(it.po_number||it.supplier_name))+'</td><td>'+_esc(isAR?it.customer_name:it.supplier_name)+'</td>' +
          '<td>'+_fmtDate(it.due_date||it.date)+'</td><td>'+(it.days_overdue||0)+'d</td><td class="text-end">'+_fmtMoney(it.balance_due,sym)+'</td></tr>';
      }).join('');
      return hdr((isAR?'Accounts Receivable':'Accounts Payable')+' Aging','Total outstanding '+_fmtMoney(t.total,sym)) +
        '<div class="card mb-3"><div class="table-container"><table class="table table-sm mb-0"><thead><tr>'+head+'<th class="text-end">Total</th></tr></thead>' +
        '<tbody><tr class="fw-bold">'+totalRow+'<td class="text-end">'+_fmtMoney(t.total,sym)+'</td></tr></tbody></table></div></div>' +
        '<div class="card"><div class="card-header">Detail</div><div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>Ref</th><th>'+(isAR?'Customer':'Supplier')+'</th><th>Due</th><th>Overdue</th><th class="text-end">Balance</th></tr></thead><tbody>'+(detail||'<tr><td colspan="5" class="text-center text-muted py-2">Nothing outstanding</td></tr>')+'</tbody></table></div></div>';
    }

    if(id==='inventory_valuation'){
      var rows='';
      (d.items||[]).forEach(function(it){rows+='<tr><td><code>'+_esc(it.sku)+'</code></td><td>'+_esc(it.name)+'</td><td>'+_esc(it.category||'—')+'</td><td class="text-end">'+it.quantity+'</td><td class="text-end">'+_fmtMoney(it.cost_price,sym)+'</td><td class="text-end fw-bold">'+_fmtMoney(it.total_value,sym)+'</td></tr>';});
      return hdr('Inventory Valuation','Total value '+_fmtMoney(d.totalValue,sym)+' · '+d.totalItems+' products') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>SKU</th><th>Name</th><th>Category</th><th class="text-end">Qty</th><th class="text-end">Cost</th><th class="text-end">Value</th></tr></thead><tbody>'+rows +
        '</tbody><tfoot><tr class="fw-bold"><td colspan="5" class="text-end">Total</td><td class="text-end">'+_fmtMoney(d.totalValue,sym)+'</td></tr></tfoot></table></div></div>';
    }

    if(id==='inventory_lowstock'){
      var out=(d.outOfStock||[]).map(function(p){return '<tr class="table-danger"><td>'+_esc(p.name)+'</td><td><code>'+_esc(p.sku)+'</code></td><td class="text-end">0</td><td class="text-end">'+p.reorder_level+'</td></tr>';}).join('');
      var low=(d.lowStock||[]).map(function(p){return '<tr class="table-warning"><td>'+_esc(p.name)+'</td><td><code>'+_esc(p.sku)+'</code></td><td class="text-end">'+p.quantity+'</td><td class="text-end">'+p.reorder_level+'</td></tr>';}).join('');
      return hdr('Low Stock Report',d.totalOut+' out of stock · '+d.totalLow+' low') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>Product</th><th>SKU</th><th class="text-end">Qty</th><th class="text-end">Reorder At</th></tr></thead><tbody>'+(out+low||'<tr><td colspan="4" class="text-center text-muted py-2">All items in stock</td></tr>')+'</tbody></table></div></div>';
    }

    if(id==='payroll_summary'){
      var t=d.totals||{};
      var rows=(d.rows||[]).map(function(r){return '<tr><td><strong>'+_esc(r.period)+'</strong></td><td>'+_badge(r.status)+'</td><td class="text-end">'+r.employees+'</td><td class="text-end">'+_fmtMoney(r.gross,sym)+'</td><td class="text-end">'+_fmtMoney(r.paye,sym)+'</td><td class="text-end">'+_fmtMoney(r.pension,sym)+'</td><td class="text-end fw-bold">'+_fmtMoney(r.net,sym)+'</td></tr>';}).join('');
      return hdr('Payroll Summary',start+' to '+end+' · '+t.runCount+' runs') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>Period</th><th>Status</th><th class="text-end">Emp.</th><th class="text-end">Gross</th><th class="text-end">PAYE</th><th class="text-end">SSNIT</th><th class="text-end">Net</th></tr></thead><tbody>'+(rows||'<tr><td colspan="7" class="text-center text-muted py-2">No runs in range</td></tr>') +
        '</tbody><tfoot><tr class="fw-bold"><td colspan="3" class="text-end">Totals</td><td class="text-end">'+_fmtMoney(t.gross,sym)+'</td><td class="text-end">'+_fmtMoney(t.paye,sym)+'</td><td class="text-end">'+_fmtMoney(Utils_toFloat(t.pensionEmployee)+Utils_toFloat(t.pensionEmployer),sym)+'</td><td class="text-end">'+_fmtMoney(t.net,sym)+'</td></tr></tfoot></table></div></div>';
    }

    if(id==='payroll_statutory'){
      var t=d.totals||{};
      var rows=(d.rows||[]).map(function(r){return '<tr><td><strong>'+_esc(r.period)+'</strong></td><td class="text-end">'+_fmtMoney(r.paye,sym)+'</td><td class="text-end">'+_fmtMoney(r.ssnit_employee,sym)+'</td><td class="text-end">'+_fmtMoney(r.ssnit_employer,sym)+'</td><td class="text-end">'+_fmtMoney(r.ssnit_total,sym)+'</td><td class="text-end fw-bold">'+_fmtMoney(r.total_statutory,sym)+'</td></tr>';}).join('');
      return hdr('Statutory Remittance',start+' to '+end+' · PAYE to GRA, SSNIT to pension fund') +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>Period</th><th class="text-end">PAYE</th><th class="text-end">SSNIT Emp.</th><th class="text-end">SSNIT Empr.</th><th class="text-end">SSNIT Total</th><th class="text-end">Total</th></tr></thead><tbody>'+(rows||'<tr><td colspan="6" class="text-center text-muted py-2">No runs in range</td></tr>') +
        '</tbody><tfoot><tr class="fw-bold"><td class="text-end">Totals</td><td class="text-end">'+_fmtMoney(t.paye,sym)+'</td><td class="text-end">'+_fmtMoney(t.ssnit_employee,sym)+'</td><td class="text-end">'+_fmtMoney(t.ssnit_employer,sym)+'</td><td class="text-end">'+_fmtMoney(t.ssnit_total,sym)+'</td><td class="text-end">'+_fmtMoney(t.total_statutory,sym)+'</td></tr></tfoot></table></div></div>';
    }

    if(id==='payroll_by_dept'){
      var t=d.totals||{};
      var rows=(d.rows||[]).map(function(r){return '<tr><td>'+_esc(r.department)+'</td><td class="text-end">'+r.employees+'</td><td class="text-end">'+_fmtMoney(r.gross,sym)+'</td><td class="text-end">'+_fmtMoney(r.paye,sym)+'</td><td class="text-end fw-bold">'+_fmtMoney(r.net,sym)+'</td></tr>';}).join('');
      return hdr('Payroll Cost by Department',start+' to '+end) +
        '<div class="card"><div class="table-container"><table class="table table-sm mb-0"><thead><tr><th>Department</th><th class="text-end">Emp.</th><th class="text-end">Gross</th><th class="text-end">PAYE</th><th class="text-end">Net</th></tr></thead><tbody>'+(rows||'<tr><td colspan="5" class="text-center text-muted py-2">No data in range</td></tr>') +
        '</tbody><tfoot><tr class="fw-bold"><td class="text-end">Total</td><td class="text-end">'+t.employees+'</td><td class="text-end">'+_fmtMoney(t.gross,sym)+'</td><td class="text-end">'+_fmtMoney(t.paye,sym)+'</td><td class="text-end">'+_fmtMoney(t.net,sym)+'</td></tr></tfoot></table></div></div>';
    }

    if(id==='financial_ratios'){
      return _ratiosTable(d,sym);
    }

    return '<div class="alert alert-info">Report generated.</div>';
  }

  function _ratiosTable(d, sym) {
    var fmt=function(v,suffix){return v===null||v===undefined?'<span class="text-muted">n/a</span>':v+(suffix||'');};
    var row=function(label,val,hint){return '<tr><td>'+label+'</td><td class="text-end fw-bold">'+val+'</td><td class="small text-muted">'+(hint||'')+'</td></tr>';};
    var l=d.liquidity||{},p=d.profitability||{},e=d.efficiency||{},cf=d.cashFlow||{};
    return '<div class="report-header"><h4>Financial Ratios</h4><div class="text-muted small">As of '+d.asOf+'</div></div>' +
      '<div class="row g-3">' +
      '<div class="col-md-6"><div class="card"><div class="card-header">Liquidity</div><div class="table-container"><table class="table table-sm mb-0"><tbody>' +
        row('Current Ratio',fmt(l.currentRatio),'Current assets / current liabilities') +
        row('Quick Ratio',fmt(l.quickRatio),'(Current assets − inventory) / current liabilities') +
        '</tbody></table></div></div></div>' +
      '<div class="col-md-6"><div class="card"><div class="card-header">Profitability</div><div class="table-container"><table class="table table-sm mb-0"><tbody>' +
        row('Gross Margin',fmt(p.grossMargin,'%'),'Gross profit / revenue') +
        row('Net Margin',fmt(p.netMargin,'%'),'Net profit / revenue') +
        row('Return on Assets',fmt(p.returnOnAssets,'%'),'Net profit / total assets') +
        '</tbody></table></div></div></div>' +
      '<div class="col-md-6"><div class="card"><div class="card-header">Efficiency</div><div class="table-container"><table class="table table-sm mb-0"><tbody>' +
        row('Inventory Turnover',fmt(e.inventoryTurnover,'x'),'COGS / inventory') +
        row('Receivable Days',fmt(e.receivableDays),'Days sales outstanding') +
        row('Payable Days',fmt(e.payableDays),'Days payable outstanding') +
        row('Asset Turnover',fmt(e.assetTurnover,'x'),'Revenue / total assets') +
        '</tbody></table></div></div></div>' +
      '<div class="col-md-6"><div class="card"><div class="card-header">Cash Flow</div><div class="table-container"><table class="table table-sm mb-0"><tbody>' +
        row('Operating Cash Flow',_fmtMoney(cf.operatingCashFlow,sym),'From cash flow statement') +
        row('Free Cash Flow',_fmtMoney(cf.freeCashFlow,sym),'Operating − capex') +
        row('Burn Rate',_fmtMoney(cf.burnRate,sym),'Monthly cash consumption') +
        row('Cash Runway',fmt(cf.cashRunwayMonths,' mo'),'Cash / burn rate') +
        '</tbody></table></div></div></div>' +
      '</div>';
  }

  // ANALYTICS DASHBOARD
  // ============================================================
  function _renderAnalytics(c) {
    var today=new Date().toISOString().split('T')[0];
    var yearStart=new Date(new Date().getFullYear(),0,1).toISOString().split('T')[0];
    c.innerHTML='<div class="card mb-3"><div class="card-body d-flex flex-wrap gap-2 align-items-end">' +
      '<div><label class="form-label small mb-1">From</label><input type="date" class="form-control form-control-sm" id="anStart" value="'+yearStart+'"></div>' +
      '<div><label class="form-label small mb-1">To</label><input type="date" class="form-control form-control-sm" id="anEnd" value="'+today+'"></div>' +
      '<button class="btn btn-sm btn-primary" onclick="App.loadAnalytics()"><i class="bi bi-arrow-repeat me-1"></i>Refresh</button>' +
      '</div></div><div id="analyticsBody"><div class="module-loading"><div class="spinner-border text-primary"></div></div></div>';
    loadAnalytics();
  }

  function loadAnalytics() {
    var start=document.getElementById('anStart').value;
    var end=document.getElementById('anEnd').value;
    var body=document.getElementById('analyticsBody');
    body.innerHTML='<div class="module-loading"><div class="spinner-border text-primary"></div></div>';
    google.script.run.withSuccessHandler(function(d){
      var sym=_config.currencySymbol||'GH₵';
      var l=d.liquidity||{},p=d.profitability||{},e=d.efficiency||{},cf=d.cashFlow||{};
      var gauge=function(label,val,suffix,col){return '<div class="col-6 col-md-3"><div class="kpi-card '+col+'"><div class="kpi-label">'+label+'</div><div class="kpi-value">'+(val===null||val===undefined?'n/a':val+(suffix||''))+'</div></div></div>';};
      body.innerHTML='<div class="row g-3 mb-3">' +
        gauge('Current Ratio',l.currentRatio,'x','info') +
        gauge('Net Margin',p.netMargin,'%','success') +
        gauge('Return on Assets',p.returnOnAssets,'%','warning') +
        gauge('Cash Runway',cf.cashRunwayMonths,' mo','primary') +
        '</div>' +
        '<div class="row g-3 mb-3">' +
        '<div class="col-lg-6"><div class="card"><div class="card-header">Profitability Margins</div><div class="card-body"><div class="chart-container" style="height:240px;"><canvas id="anMargins"></canvas></div></div></div></div>' +
        '<div class="col-lg-6"><div class="card"><div class="card-header">Efficiency (days)</div><div class="card-body"><div class="chart-container" style="height:240px;"><canvas id="anEfficiency"></canvas></div></div></div></div>' +
        '</div>' +
        '<div id="ratiosDetail"></div>';
      document.getElementById('ratiosDetail').innerHTML=_ratiosTable(d,sym);

      _destroyChart('anMargins');
      var ctx=document.getElementById('anMargins');
      if(ctx)_charts.anMargins=new Chart(ctx,{type:'bar',data:{labels:['Gross','Net','ROA'],datasets:[{label:'%',data:[p.grossMargin||0,p.netMargin||0,p.returnOnAssets||0],backgroundColor:['#1a73e8','#34a853','#fbbc04']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
      _destroyChart('anEfficiency');
      var ctx2=document.getElementById('anEfficiency');
      if(ctx2)_charts.anEfficiency=new Chart(ctx2,{type:'bar',data:{labels:['Receivable Days','Payable Days'],datasets:[{label:'Days',data:[e.receivableDays||0,e.payableDays||0],backgroundColor:['#ea4335','#8e24aa']}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}}}});
    }).withFailureHandler(function(e){body.innerHTML='<div class="alert alert-danger">'+e.message+'</div>';}).getFinancialRatios({start:start,end:end});
  }

  function _renderPlaceholder(c,mod) {
    c.innerHTML='<div class="text-center py-5"><div style="font-size:4rem;color:var(--text-muted);margin-bottom:1rem;"><i class="bi bi-tools"></i></div>' +
      '<h3 class="text-muted">'+(MODULE_TITLES[mod]||mod)+'</h3><p class="text-muted mb-4">Coming in a future phase.</p>' +
      '<button class="btn btn-primary" onclick="App.navigate(\'dashboard\')"><i class="bi bi-arrow-left me-1"></i>Dashboard</button></div>';
  }

  // Utility to parse floats safely client-side
  function Utils_toFloat(v){return parseFloat(v)||0;}

  // ============================================================

  return {

    // Customers
    showCustomerModal:showCustomerModal, saveCustomer:saveCustomer,

    showInvoiceModal:showInvoiceModal, addLineItem:addLineItem, onProductSelect:onProductSelect,

    // Accounting
    _loadAccTab:_loadAccTab,
    loadLedger:loadLedger, loadStatements:loadStatements,
    validateBooks:validateBooks,
    showJournalModal:showJournalModal, _addJournalLine:_addJournalLine,
    _recalcJournal:_recalcJournal, saveJournal:saveJournal,
    showAccountModal:showAccountModal, saveAccount:saveAccount,
    doClosePeriod:doClosePeriod, _doCloseConfirmed:_doCloseConfirmed,
    doReopenPeriod:doReopenPeriod, _doReopenConfirmed:_doReopenConfirmed,
    showEmployeeModal:showEmployeeModal, saveEmployee:saveEmployee, _applyStructure:_applyStructure,
    previewEmployeePayslip:previewEmployeePayslip,
    showStructureModal:showStructureModal, saveStructure:saveStructure,
    previewPayrollRun:previewPayrollRun, processPayrollRun:processPayrollRun,
    _doProcessPayroll:_doProcessPayroll, payNetSalaries:payNetSalaries, _doPayNet:_doPayNet,
    runReport:runReport, loadAnalytics:loadAnalytics,
    // Inventory
    showProductModal:showProductModal, saveProduct:saveProduct,
    showAdjustModal:showAdjustModal, saveAdjust:saveAdjust,
    showDamageModal:showDamageModal, saveDamage:saveDamage,
    showTransferModal:showTransferModal, saveTransfer:saveTransfer,
    showCategoryModal:showCategoryModal, saveCategory:saveCategory,
    showSupplierModal:showSupplierModal, saveSupplier:saveSupplier,
    _filterTxnType:_filterTxnType,
    // Internal
    _filterTable:_filterTable,
    getUser:function(){return _user;}, getConfig:function(){return _config;}
  };

})();
